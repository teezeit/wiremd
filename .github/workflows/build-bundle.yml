name: Build CLI bundle

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'vscode-extension/src/**'
      - 'scripts/build-bundle.mjs'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm ci --prefix vscode-extension

      - run: npm run bundle

      - name: Commit bundle if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/wiremd.js releases/wiremd.vsix skills/wireframe/bin/wiremd.js
          git diff --cached --quiet || git commit -m "chore(bundle): rebuild CLI bundle [skip ci]"
          git push
