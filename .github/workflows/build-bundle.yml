name: Build & release artifacts

on:
  push:
    branches: [main]
    paths:
      - 'packages/core/src/**'
      - 'extensions/skills/**'
      - 'extensions/vscode/src/**'
      - 'scripts/build-bundle.mjs'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - run: pnpm --filter wiremd-preview run bundle

      # Commit the plugin copy — must stay in git for the git-subdir plugin pull
      - name: Commit plugin bin if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extensions/skills/wireframe/bin/wiremd.js
          git diff --cached --quiet || git commit -m "chore(bundle): rebuild plugin CLI bundle [skip ci]"
          git push

      # Upload CLI + vsix to a rolling 'latest' GitHub Release
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            --title "Latest build" \
            --notes "Auto-built from \`$(git rev-parse --short HEAD)\` on \`$(date -u +%Y-%m-%d)\`." \
            --prerelease \
            releases/wiremd.js \
            releases/wiremd.vsix
