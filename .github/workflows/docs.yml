name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/docs/**'
      - 'apps/editor/**'
      - 'apps/landing/**'
      - 'packages/core/src/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # For lastUpdated feature

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @eclectic-ai/wiremd run build

      - name: Build VitePress site
        run: pnpm --filter wiremd-docs run build

      - name: Build landing
        run: pnpm --filter wiremd-landing run build

      - name: Copy landing into docs dist
        run: cp -r apps/landing/dist/. apps/docs/.vitepress/dist/

      - name: Build editor
        run: pnpm --filter wiremd-editor run build
        env:
          VITE_BASE: /wiremd/editor/
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Copy editor into docs dist
        run: |
          mkdir -p apps/docs/.vitepress/dist/editor
          cp -r apps/editor/dist/. apps/docs/.vitepress/dist/editor/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
