name: Release artifacts

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package wireframe skill
        run: npm run skill:zip

      - name: Attach skill zip to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: wireframe-skill.zip
