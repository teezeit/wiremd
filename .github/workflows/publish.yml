name: Release artifacts

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Package wireframe skill
        run: pnpm run skill:zip

      - name: Attach skill zip to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: wireframe-skill.zip

      - name: Build VS Code extension
        run: pnpm --filter wiremd-preview run bundle

      - name: Publish VS Code extension to Marketplace
        run: pnpm --filter wiremd-preview run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
