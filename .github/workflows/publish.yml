name: Release artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.3.1)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Package wireframe skill
        run: pnpm run skill:zip

      - name: Attach skill zip to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          files: releases/wireframe-skill.zip

      - name: Build VS Code extension
        run: pnpm --filter wiremd-preview run bundle

      - name: Publish VS Code extension to Marketplace
        run: |
          set -o pipefail
          pnpm --filter wiremd-preview run publish 2>&1 | tee /tmp/vsce.log \
            || grep -q "already exists" /tmp/vsce.log \
            || (cat /tmp/vsce.log && exit 1)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish npm package
        working-directory: packages/core
        run: |
          npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ''
