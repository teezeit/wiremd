name: Release artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.3.1)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Package wireframe skill
        run: pnpm run skill:zip

      - name: Attach skill zip to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/wireframe-skill.zip

      - name: Build VS Code extension
        run: pnpm --filter wiremd-preview run bundle

      - name: Publish VS Code extension to Marketplace
        run: pnpm --filter wiremd-preview run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish npm package
        run: pnpm --filter "@eclectic-ai/wiremd" publish --access public --no-git-checks --provenance
