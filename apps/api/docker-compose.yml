services:
  db:
    container_name: wiremd-pg
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wiremd
      POSTGRES_USER: wiremd
      POSTGRES_PASSWORD: wiremd
    volumes:
      - wiremd_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiremd -d wiremd"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  wiremd_pg_data:
