<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-accordion wmd-exclusive" data-wmd-accordion data-wmd-accordion-exclusive>
<details class="wmd-accordion-item">
  <summary class="wmd-accordion-summary">Personal plan</summary>
  <div class="wmd-accordion-body">
  <button class="wmd-button wmd-button-primary">Get started for free</button>
<p class="wmd-paragraph">Up to 5 wireframes per month.</p>
  </div>
</details>
<details class="wmd-accordion-item">
  <summary class="wmd-accordion-summary">Pro plan</summary>
  <div class="wmd-accordion-body">
  <button class="wmd-button wmd-button-primary">$12/month</button>
<p class="wmd-paragraph">Unlimited wireframes, VS Code extension, priority support.</p>
  </div>
</details>
<details class="wmd-accordion-item">
  <summary class="wmd-accordion-summary">Enterprise plan</summary>
  <div class="wmd-accordion-body">
  <button class="wmd-button wmd-button-primary">Contact sales</button>
<p class="wmd-paragraph">SSO, audit logs, dedicated support, custom limits.</p>
  </div>
</details>
</div><script>(function(){if(window.__wmdAccordionExclusiveInit)return;window.__wmdAccordionExclusiveInit=true;document.addEventListener('toggle',function(e){var details=e.target;if(!details.open)return;var root=details.closest('[data-wmd-accordion-exclusive]');if(!root)return;root.querySelectorAll('.wmd-accordion-item').forEach(function(d){if(d!==details)d.removeAttribute('open');});},{capture:true});})();</script>
  
  
</body>
</html>
