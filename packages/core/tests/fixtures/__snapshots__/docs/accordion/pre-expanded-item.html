<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-accordion" data-wmd-accordion>
<details class="wmd-accordion-item">
  <summary class="wmd-accordion-summary">Getting started</summary>
  <div class="wmd-accordion-body">
  <div class="wmd-row">
  <div class="wmd-grid-item">
    <button class="wmd-button wmd-button-primary">Download CLI</button>
  </div>
<div class="wmd-grid-item">
    <button class="wmd-button">Read docs</button>
  </div>
</div>
<p class="wmd-paragraph">Install with <code class="wmd-code-inline">npm install -g wiremd</code>, then run <code class="wmd-code-inline">wiremd input.md</code>.</p>
  </div>
</details>
<details class="wmd-accordion-item" open>
  <summary class="wmd-accordion-summary">Advanced usage</summary>
  <div class="wmd-accordion-body">
  <p class="wmd-paragraph">Pass <code class="wmd-code-inline">--style sketch</code> for a hand-drawn look, or <code class="wmd-code-inline">--format react</code> to output JSX.</p>
<p class="wmd-paragraph">Run <code class="wmd-code-inline">wiremd --help</code> for all options.</p>
  </div>
</details>
<details class="wmd-accordion-item">
  <summary class="wmd-accordion-summary">VS Code extension</summary>
  <div class="wmd-accordion-body">
  <p class="wmd-paragraph">Install <strong>wiremd</strong> from the VS Code Marketplace for live preview on save.</p>
  </div>
</details>
</div>
  
  
</body>
</html>
