<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-container-alert wmd-warning">

  </div>

    <button class="wmd-button">Dismiss</button>
  </div>
</div>
</div>
