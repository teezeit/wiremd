<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="border-l-4 p-4 my-4 rounded bg-blue-50 border-blue-500 text-blue-900">
  <p class="text-gray-700 my-3">Storage limit reached</p>
  <p class="text-gray-700 my-3">Upgrade your plan to continue uploading files.</p>
  <div class="flex items-center gap-3 flex-wrap">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">Upgrade Now</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Dismiss</button>
</div>
</div>
</body>
</html>
