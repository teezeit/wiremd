<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-grid wmd-grid-3" style="--grid-columns: 3">
  <div class="wmd-grid-item wmd-align-left">
    <button class="wmd-button wmd-button-primary">Left</button>
  </div>
<div class="wmd-grid-item wmd-align-center">
    <button class="wmd-button wmd-button-primary">Center</button>
  </div>
<div class="wmd-grid-item wmd-align-right">
    <button class="wmd-button wmd-button-primary">Right</button>
  </div>
</div>
  
  
</body>
</html>
