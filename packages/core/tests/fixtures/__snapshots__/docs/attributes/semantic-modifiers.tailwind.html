<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="flex items-center gap-3 flex-wrap">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">Primary</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-200 text-gray-900 hover:bg-gray-300">Secondary</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-red-600 text-white hover:bg-red-700">Danger</button>
  <button class="px-6 py-3 text-lg rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Large</button>
</div>
</body>
</html>
