<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <table class="wmd-table">
  <thead>
    <tr>
      <th class="wmd-table-cell wmd-align-left">Feature</th>
    <th class="wmd-table-cell wmd-align-left">Status</th>
    </tr>
  </thead>
  <tbody>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Auth</td>
    <td class="wmd-table-cell wmd-align-left">|Done|{.success}</td>
  </tr>
    <tr>
    <td class="wmd-table-cell wmd-align-left">API</td>
    <td class="wmd-table-cell wmd-align-left">|In Progress|{.warning}</td>
  </tr>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Docs</td>
    <td class="wmd-table-cell wmd-align-left">|Planned|</td>
  </tr>
  </tbody>
</table>
  
  
</body>
</html>
