<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <table class="min-w-full bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden my-6">
  <thead class="bg-gray-50">
    <tr>
      <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Feature</th>
    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Status</th>
    </tr>
  </thead>
  <tbody class="divide-y divide-gray-200">
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Auth</td>
    <td class="px-6 py-3 text-gray-900"><span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Done</span></td>
  </tr>
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">API</td>
    <td class="px-6 py-3 text-gray-900"><span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">In Progress</span></td>
  </tr>
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Docs</td>
    <td class="px-6 py-3 text-gray-900"><span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">Planned</span></td>
  </tr>
  </tbody>
</table>
</body>
</html>
