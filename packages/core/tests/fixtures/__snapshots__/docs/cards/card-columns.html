<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-grid wmd-grid-3" style="--grid-columns: 3">
  <div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Free</h3>
<p class="wmd-paragraph">$0 / month</p>
<ul class="wmd-list">
  <li class="wmd-list-item">1 user</li>
  <li class="wmd-list-item">5 projects</li>
</ul>
<button class="wmd-button">Get Started</button>
  </div>
<div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Pro</h3>
<p class="wmd-paragraph">$12 / month</p>
<ul class="wmd-list">
  <li class="wmd-list-item">10 users</li>
  <li class="wmd-list-item">Unlimited projects</li>
</ul>
<button class="wmd-button wmd-button-primary">Start Trial</button>
  </div>
<div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Enterprise</h3>
<p class="wmd-paragraph">Custom pricing</p>
<ul class="wmd-list">
  <li class="wmd-list-item">Unlimited users</li>
  <li class="wmd-list-item">SLA support</li>
</ul>
<button class="wmd-button">Contact Sales</button>
  </div>
</div>
  
  
</body>
</html>
