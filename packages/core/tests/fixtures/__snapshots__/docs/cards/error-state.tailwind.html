<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="p-4 my-4">
  <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Failed to load</h3>
  <p class="text-gray-700 my-3">Could not connect to the server. Check your connection and try again.</p>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">Retry</button>
</div>
</body>
</html>
