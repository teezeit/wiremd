<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="bg-white rounded-lg p-8 shadow-2xl max-w-md mx-auto my-8">
  <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Delete project?</h3>
  <p class="text-gray-700 my-3">This will permanently delete &lt;strong&gt;Acme Redesign&lt;/strong&gt; and all its files. This action cannot be undone.</p>
  <div class="flex flex-wrap gap-2 my-4">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Cancel</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-red-600 text-white hover:bg-red-700">Delete</button>
</div>
</div>
</body>
</html>
