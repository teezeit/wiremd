<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-container-section">
  <h2 class="wmd-h2">Recent Activity</h2>
<table class="wmd-table">
  <thead>
    <tr>
      <th class="wmd-table-cell wmd-align-left">User</th>
    <th class="wmd-table-cell wmd-align-left">Action</th>
    <th class="wmd-table-cell wmd-align-left">Time</th>
    </tr>
  </thead>
  <tbody>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Alice</td>
    <td class="wmd-table-cell wmd-align-left">Created project</td>
    <td class="wmd-table-cell wmd-align-left">2 min ago</td>
  </tr>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Bob</td>
    <td class="wmd-table-cell wmd-align-left">Left a comment</td>
    <td class="wmd-table-cell wmd-align-left">15 min ago</td>
  </tr>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Clara</td>
    <td class="wmd-table-cell wmd-align-left">Uploaded file</td>
    <td class="wmd-table-cell wmd-align-left">1 hr ago</td>
  </tr>
  </tbody>
</table>
</div>
  
  
</body>
</html>
