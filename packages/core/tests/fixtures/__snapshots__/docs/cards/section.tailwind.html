<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="py-6 border-b border-gray-200 last:border-b-0">
  <h2 class="text-3xl font-bold text-gray-900 mb-3 mt-6">Recent Activity</h2>
  <table class="min-w-full bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden my-6">
  <thead class="bg-gray-50">
    <tr>
      <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">User</th>
    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Action</th>
    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Time</th>
    </tr>
  </thead>
  <tbody class="divide-y divide-gray-200">
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Alice</td>
    <td class="px-6 py-3 text-gray-900">Created project</td>
    <td class="px-6 py-3 text-gray-900">2 min ago</td>
  </tr>
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Bob</td>
    <td class="px-6 py-3 text-gray-900">Left a comment</td>
    <td class="px-6 py-3 text-gray-900">15 min ago</td>
  </tr>
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Clara</td>
    <td class="px-6 py-3 text-gray-900">Uploaded file</td>
    <td class="px-6 py-3 text-gray-900">1 hr ago</td>
  </tr>
  </tbody>
</table>
</div>
</body>
</html>
