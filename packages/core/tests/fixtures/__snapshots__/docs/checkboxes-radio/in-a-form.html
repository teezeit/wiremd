<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <h2 class="wmd-h2">Preferences</h2>
<ul class="wmd-list">
  <label class="wmd-checkbox">
    <input type="checkbox" checked />
    <span>Send me product updates</span>
  </label>
  <label class="wmd-checkbox">
    <input type="checkbox" />
    <span>Send me marketing emails</span>
  </label>
  <label class="wmd-checkbox">
    <input type="checkbox" checked />
    <span>Enable two-factor authentication</span>
  </label>
  <label class="wmd-checkbox">
    <input type="checkbox" />
    <span>Make my profile public</span>
  </label>
</ul>
<button class="wmd-button wmd-button-primary">Save Preferences</button>
  
  
</body>
</html>
