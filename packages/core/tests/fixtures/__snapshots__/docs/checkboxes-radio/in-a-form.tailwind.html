<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <h2 class="text-3xl font-bold text-gray-900 mb-3 mt-6">Preferences</h2>
  <ul class="my-4 pl-6 space-y-2 list-disc">
  <label class="flex items-center gap-2 cursor-pointer">
    <input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" checked />
    <span class="text-gray-900">Send me product updates</span>
  </label>
  <label class="flex items-center gap-2 cursor-pointer">
    <input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" />
    <span class="text-gray-900">Send me marketing emails</span>
  </label>
  <label class="flex items-center gap-2 cursor-pointer">
    <input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" checked />
    <span class="text-gray-900">Enable two-factor authentication</span>
  </label>
  <label class="flex items-center gap-2 cursor-pointer">
    <input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" />
    <span class="text-gray-900">Make my profile public</span>
  </label>
</ul>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">Save Preferences</button>
</body>
</html>
