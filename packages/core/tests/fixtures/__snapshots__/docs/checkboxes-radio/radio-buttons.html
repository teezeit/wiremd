<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <p class="wmd-paragraph">Subscription plan</p>
<ul class="wmd-list">
  <label class="wmd-radio">
    <input type="radio" name="radio-group-1" />
    <span>Free — 1 user, 5 projects</span>
  </label>
  <label class="wmd-radio">
    <input type="radio" checked name="radio-group-1" />
    <span>Pro — 10 users, unlimited projects</span>
  </label>
  <label class="wmd-radio">
    <input type="radio" name="radio-group-1" />
    <span>Enterprise — unlimited everything</span>
  </label>
</ul>
  
  
</body>
</html>
