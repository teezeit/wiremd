<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <p class="text-gray-700 my-3">Subscription plan</p>
  <ul class="my-4 pl-6 space-y-2 list-disc">
  <label class="flex items-center gap-2 cursor-pointer">
    <input type="radio" class="w-4 h-4 text-indigo-600 border-gray-300 focus:ring-indigo-500" />
    <span class="text-gray-900">Free — 1 user, 5 projects</span>
  </label>
  <label class="flex items-center gap-2 cursor-pointer">
    <input type="radio" class="w-4 h-4 text-indigo-600 border-gray-300 focus:ring-indigo-500" checked />
    <span class="text-gray-900">Pro — 10 users, unlimited projects</span>
  </label>
  <label class="flex items-center gap-2 cursor-pointer">
    <input type="radio" class="w-4 h-4 text-indigo-600 border-gray-300 focus:ring-indigo-500" />
    <span class="text-gray-900">Enterprise — unlimited everything</span>
  </label>
</ul>
</body>
</html>
