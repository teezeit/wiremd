<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-container-card">
  <h3 class="wmd-h3">Preferences</h3>
<label class="wmd-switch">
    <span class="wmd-switch-label">Email notifications</span>
    <input type="checkbox" role="switch" checked />
    <span class="wmd-switch-track"><span class="wmd-switch-thumb"></span></span>
  </label>
<label class="wmd-switch">
    <span class="wmd-switch-label">SMS notifications</span>
    <input type="checkbox" role="switch" />
    <span class="wmd-switch-track"><span class="wmd-switch-thumb"></span></span>
  </label>
<label class="wmd-switch">
    <span class="wmd-switch-label">Auto-save drafts</span>
    <input type="checkbox" role="switch" checked />
    <span class="wmd-switch-track"><span class="wmd-switch-thumb"></span></span>
  </label>
<label class="wmd-switch">
    <span class="wmd-switch-label">Experimental features</span>
    <input type="checkbox" role="switch" disabled />
    <span class="wmd-switch-track"><span class="wmd-switch-thumb"></span></span>
  </label>
</div>
  
  
</body>
</html>
