<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="bg-white rounded-lg p-6 shadow-md border border-gray-200 my-4">
  <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Preferences</h3>
  <label class="flex items-center justify-between gap-3 cursor-pointer">
    <span class="text-gray-900">Email notifications</span>
    <input type="checkbox" role="switch" class="sr-only" checked />
    <span class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full border border-indigo-600 bg-indigo-600 transition-colors"><span class="absolute right-0.5 h-4 w-4 rounded-full bg-white shadow"></span></span>
  </label>
  <label class="flex items-center justify-between gap-3 cursor-pointer">
    <span class="text-gray-900">SMS notifications</span>
    <input type="checkbox" role="switch" class="sr-only" />
    <span class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full border border-gray-400 bg-gray-100 transition-colors"><span class="absolute left-0.5 h-4 w-4 rounded-full bg-white border border-gray-400 shadow-sm"></span></span>
  </label>
  <label class="flex items-center justify-between gap-3 cursor-pointer">
    <span class="text-gray-900">Auto-save drafts</span>
    <input type="checkbox" role="switch" class="sr-only" checked />
    <span class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full border border-indigo-600 bg-indigo-600 transition-colors"><span class="absolute right-0.5 h-4 w-4 rounded-full bg-white shadow"></span></span>
  </label>
  <label class="flex items-center justify-between gap-3 opacity-50 cursor-not-allowed">
    <span class="text-gray-900">Experimental features</span>
    <input type="checkbox" role="switch" class="sr-only" disabled />
    <span class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full border border-gray-400 bg-gray-100 transition-colors"><span class="absolute left-0.5 h-4 w-4 rounded-full bg-white border border-gray-400 shadow-sm"></span></span>
  </label>
</div>
</body>
</html>
