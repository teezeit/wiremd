<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-grid wmd-grid-3" style="--grid-columns: 3">
  <div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Fast</h3>
<p class="wmd-paragraph">Renders in milliseconds. Works in any editor.</p>
  </div>
<div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Simple</h3>
<p class="wmd-paragraph">Plain Markdown syntax. No new tools to learn.</p>
  </div>
<div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Flexible</h3>
<p class="wmd-paragraph">7 styles. Outputs HTML, React, JSON, or Tailwind.</p>
  </div>
</div>
  
  
</body>
</html>
