<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-grid wmd-grid-3" style="--grid-columns: 3">
  <div class="wmd-grid-item wmd-card wmd-align-top wmd-grid-item-card">
    <p class="wmd-paragraph">Pinned to top</p>
  </div>
<div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <p class="wmd-paragraph">This middle column is taller.</p>
<textarea class="wmd-textarea" rows="4" placeholder="Notes..."></textarea>
  </div>
<div class="wmd-grid-item wmd-card wmd-align-bottom wmd-grid-item-card">
    <p class="wmd-paragraph">Pinned to bottom</p>
  </div>
</div>
  
  
</body>
</html>
