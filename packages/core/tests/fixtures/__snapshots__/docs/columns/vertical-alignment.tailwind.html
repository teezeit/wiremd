<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="grid gap-6 my-8 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow self-start">
    <p class="text-gray-700 my-3">Pinned to top</p>
  </div>
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <p class="text-gray-700 my-3">This middle column is taller.</p>
    <textarea class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-vertical" rows="4" placeholder="Notes..."></textarea>
  </div>
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow self-end">
    <p class="text-gray-700 my-3">Pinned to bottom</p>
  </div>
</div>
</body>
</html>
