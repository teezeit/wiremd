<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean wmd-has-comments">
  <div class="wmd-grid wmd-grid-2" style="--grid-columns: 2">
  <div class="wmd-grid-item">
    <h3 class="wmd-h3">Current design</h3>
<p class="wmd-paragraph">The existing layout. Works but feels dated.</p>
  </div>
<div class="wmd-grid-item">
    <h3 class="wmd-h3">Proposed design</h3>
<p class="wmd-paragraph">Tighter spacing, stronger hierarchy.</p>
  </div>
</div>
  <aside class="wmd-comments-panel">
  <div class="wmd-comments-panel-header">
    <span>💬 Comments</span>
    <span class="wmd-comments-panel-count">1</span>
  </div>
  <div class="wmd-comment-card"><div class="wmd-comment-card-badge">1</div><div class="wmd-comment-card-body"><div class="wmd-comment-msg">Needs a full rethink — too much whitespace. @sara</div></div></div>
</aside>
  
</body>
</html>
