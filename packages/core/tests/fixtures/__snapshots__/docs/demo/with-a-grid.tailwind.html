<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="grid gap-6 my-8 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Free</h3>
    <p class="text-gray-700 my-3">$0/mo</p>
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Get Started</button>
  </div>
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Pro</h3>
    <p class="text-gray-700 my-3">$12/mo</p>
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">Start Trial</button>
  </div>
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Enterprise</h3>
    <p class="text-gray-700 my-3">Custom</p>
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Contact Sales</button>
  </div>
</div>
</body>
</html>
