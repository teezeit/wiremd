<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-grid wmd-grid-2" style="--grid-columns: 2">
  <div class="wmd-grid-item">
    <h3 class="wmd-h3">Billing address</h3>
<div class="wmd-container-form-group">
  First name
<input type="text" class="wmd-input" required style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Last name
<input type="text" class="wmd-input" required style="width: 29ch; max-width: 29ch;" />
</div>
  </div>
<div class="wmd-grid-item">
    <h3 class="wmd-h3">Shipping address</h3>
<div class="wmd-container-form-group">
  First name
<input type="text" class="wmd-input" required style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Last name
<input type="text" class="wmd-input" required style="width: 29ch; max-width: 29ch;" />
</div>
  </div>
</div>
  
  
</body>
</html>
