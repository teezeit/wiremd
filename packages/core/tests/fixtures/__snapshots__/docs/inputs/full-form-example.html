<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <h2 class="wmd-h2">Create Account</h2>
<div class="wmd-container-form-group">
  First name
<input type="text" class="wmd-input" required style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Last name
<input type="text" class="wmd-input" required style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Email
<input type="email" class="wmd-input" required style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Password
<input type="password" class="wmd-input" required style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-button-group">
  <button class="wmd-button wmd-button-primary">Create Account</button>
<button class="wmd-button">Cancel</button>
</div>
  
  
</body>
</html>
