<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-container-form-group">
  Email
<input type="email" class="wmd-input" style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Password
<input type="password" class="wmd-input" style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Phone
<input type="tel" class="wmd-input" style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Number
<input type="number" class="wmd-input" style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  URL
<input type="url" class="wmd-input" style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Date
<input type="date" class="wmd-input" style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Time
<input type="time" class="wmd-input" style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Search
<input type="search" class="wmd-input" style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  File upload
<input type="file" class="wmd-input" style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Color
<input type="color" class="wmd-input" style="width: 29ch; max-width: 29ch;" />
</div>
  
  
</body>
</html>
