<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-container-form-group">
  Switch app
<select class="wmd-select wmd-navigation-select" onchange="if (this.value) window.location.href = this.value">
    <option value="" disabled selected>Switch app</option>
    <option value="./jira.md" data-href="./jira.md">Jira</option>
    <option value="./confluence.md" data-href="./confluence.md">Confluence</option>
    <option value="./bitbucket.md" data-href="./bitbucket.md">Bitbucket</option>
  </select>
</div>
  
  
</body>
</html>
