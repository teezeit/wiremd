<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="mb-4">
  Switch app
  <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent wmd-navigation-select" onchange="if (this.value) window.location.href = this.value">
    <option value="" disabled selected>Switch app</option>
    <option value="./jira.md" data-href="./jira.md">Jira</option>
    <option value="./confluence.md" data-href="./confluence.md">Confluence</option>
    <option value="./bitbucket.md" data-href="./bitbucket.md">Bitbucket</option>
  </select>
</div>
</body>
</html>
