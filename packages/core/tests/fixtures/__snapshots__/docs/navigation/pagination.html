<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-row">
  <div class="wmd-grid-item">
    <button class="wmd-button">← Prev</button>
  </div>
<div class="wmd-grid-item">
    <button class="wmd-button wmd-button-primary">1</button>
  </div>
<div class="wmd-grid-item">
    <button class="wmd-button">2</button>
  </div>
<div class="wmd-grid-item">
    <button class="wmd-button">3</button>
  </div>
<div class="wmd-grid-item">
    <button class="wmd-button">4</button>
  </div>
<div class="wmd-grid-item">
    <button class="wmd-button">Next →</button>
  </div>
</div>
  
  
</body>
</html>
