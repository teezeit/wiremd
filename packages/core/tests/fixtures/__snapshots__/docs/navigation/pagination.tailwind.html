<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="flex flex-wrap gap-2 my-4">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">← Prev</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">1</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">2</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">3</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">4</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Next →</button>
</div>
</body>
</html>
