<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="p-4 my-4">
  <h4 class="text-xl font-semibold text-gray-800 mb-2 mt-4">Main</h4>
  <div class="flex flex-wrap gap-2 my-4">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">Dashboard</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Projects</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Tasks</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Calendar</button>
</div>
  <h4 class="text-xl font-semibold text-gray-800 mb-2 mt-4">Account</h4>
  <div class="flex flex-wrap gap-2 my-4">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Settings</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Billing</button>
</div>
  <hr class="border-t border-gray-300 my-8" />
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Logout</button>
</div>
</body>
</html>
