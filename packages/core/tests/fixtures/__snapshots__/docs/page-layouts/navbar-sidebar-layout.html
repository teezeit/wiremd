<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <nav class="wmd-nav">
  <div class="wmd-nav-content">
    <div class="wmd-brand">App</div>
    <button class="wmd-button">Dashboard</button>
    <button class="wmd-button">Notifications</button>
    <button class="wmd-button">Settings</button>
    <button class="wmd-button">JD</button>
  </div>
</nav>
<div class="wmd-container-layout wmd-sidebar-main">
  <div class="wmd-layout-sidebar">
    <h4 class="wmd-h4">Main</h4>
<div class="wmd-container-button-group">
  <button class="wmd-button wmd-button-primary">Dashboard</button>
<button class="wmd-button">Projects</button>
<button class="wmd-button">Tasks</button>
</div>
<h4 class="wmd-h4">Admin</h4>
<div class="wmd-container-button-group">
  <button class="wmd-button">Users</button>
<button class="wmd-button">Billing</button>
</div>
<hr class="wmd-separator" />
<button class="wmd-button">Logout</button>
  </div>
  <div class="wmd-layout-main">
    <h2 class="wmd-h2">Dashboard</h2>
<div class="wmd-grid wmd-grid-3" style="--grid-columns: 3">
  <div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Revenue</h3>
<p class="wmd-paragraph"><strong>$12,400</strong>
+8% this month</p>
  </div>
<div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Users</h3>
<p class="wmd-paragraph"><strong>1,240</strong>
+23 this week</p>
  </div>
<div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Open Tasks</h3>
<p class="wmd-paragraph"><strong>34</strong>
5 due today</p>
  </div>
</div>
  </div>
</div>
  
  
</body>
</html>
