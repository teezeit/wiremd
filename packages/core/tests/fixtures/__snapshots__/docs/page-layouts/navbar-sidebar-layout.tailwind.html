<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <nav class="bg-white shadow-sm rounded-lg p-4 mb-8">
  <div class="flex items-center gap-6 flex-wrap">
    <div class="font-bold text-xl text-gray-900 mr-auto flex items-center gap-2">App</div>
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Dashboard</button>
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Notifications</button>
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Settings</button>
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">JD</button>
  </div>
</nav>
  <div class="grid grid-cols-[220px_1fr] gap-4 items-start">
  <div class="min-w-0">
    <div class="p-4 my-4">
  <h4 class="text-xl font-semibold text-gray-800 mb-2 mt-4">Main</h4>
  <div class="flex flex-wrap gap-2 my-4">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">Dashboard</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Projects</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Tasks</button>
</div>
  <h4 class="text-xl font-semibold text-gray-800 mb-2 mt-4">Admin</h4>
  <div class="flex flex-wrap gap-2 my-4">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Users</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Billing</button>
</div>
  <hr class="border-t border-gray-300 my-8" />
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Logout</button>
</div>
  </div>
  <div class="min-w-0 [&>*:first-child]:mt-0">
    <h2 class="text-3xl font-bold text-gray-900 mb-3 mt-6">Dashboard</h2>
  <div class="grid gap-6 my-8 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Revenue</h3>
    <p class="text-gray-700 my-3"><strong class="font-semibold">$12,400</strong>
+8% this month</p>
  </div>
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Users</h3>
    <p class="text-gray-700 my-3"><strong class="font-semibold">1,240</strong>
+23 this week</p>
  </div>
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Open Tasks</h3>
    <p class="text-gray-700 my-3"><strong class="font-semibold">34</strong>
5 due today</p>
  </div>
</div>
  </div>
</div>
</body>
</html>
