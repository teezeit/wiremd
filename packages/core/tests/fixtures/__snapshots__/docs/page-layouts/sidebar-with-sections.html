<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-container-layout wmd-sidebar-main">
  <div class="wmd-layout-sidebar">
    <p class="wmd-paragraph"><strong>Acme Co.</strong></p>
<h4 class="wmd-h4">Workspace</h4>
<div class="wmd-container-button-group">
  <button class="wmd-button wmd-button-primary">Overview</button>
<button class="wmd-button">Projects</button>
<button class="wmd-button">Tasks</button>
<button class="wmd-button">Calendar</button>
</div>
<h4 class="wmd-h4">Team</h4>
<div class="wmd-container-button-group">
  <button class="wmd-button">Members</button>
<button class="wmd-button">Roles</button>
</div>
<hr class="wmd-separator" />
<button class="wmd-button">Logout</button>
  </div>
  <div class="wmd-layout-main">
    <h2 class="wmd-h2">Overview</h2>
<div class="wmd-grid wmd-grid-3" style="--grid-columns: 3">
  <div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Tasks Done</h3>
<p class="wmd-paragraph"><strong>48</strong> this week</p>
  </div>
<div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">In Progress</h3>
<p class="wmd-paragraph"><strong>12</strong> open</p>
  </div>
<div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Upcoming</h3>
<p class="wmd-paragraph"><strong>5</strong> due today</p>
  </div>
</div>
  </div>
</div>
  
  
</body>
</html>
