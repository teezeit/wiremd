<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="grid grid-cols-[220px_1fr] gap-4 items-start">
  <div class="min-w-0">
    <div class="p-4 my-4">
  <p class="text-gray-700 my-3"><strong class="font-semibold">Acme Co.</strong></p>
  <h4 class="text-xl font-semibold text-gray-800 mb-2 mt-4">Workspace</h4>
  <div class="flex items-center gap-3 flex-wrap">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">Overview</button>
</div>
  <div class="flex items-center gap-3 flex-wrap">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Projects</button>
</div>
  <div class="flex items-center gap-3 flex-wrap">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Tasks</button>
</div>
  <div class="flex items-center gap-3 flex-wrap">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Calendar</button>
</div>
  <h4 class="text-xl font-semibold text-gray-800 mb-2 mt-4">Team</h4>
  <div class="flex items-center gap-3 flex-wrap">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Members</button>
</div>
  <div class="flex items-center gap-3 flex-wrap">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Roles</button>
</div>
  <hr class="border-t border-gray-300 my-8" />
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Logout</button>
</div>
  </div>
  <div class="min-w-0 [&>*:first-child]:mt-0">
    <h2 class="text-3xl font-bold text-gray-900 mb-3 mt-6">Overview</h2>
  <div class="grid gap-6 my-8 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Tasks Done</h3>
    <p class="text-gray-700 my-3"><strong class="font-semibold">48</strong> this week</p>
  </div>
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">In Progress</h3>
    <p class="text-gray-700 my-3"><strong class="font-semibold">12</strong> open</p>
  </div>
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Upcoming</h3>
    <p class="text-gray-700 my-3"><strong class="font-semibold">5</strong> due today</p>
  </div>
</div>
  </div>
</div>
</body>
</html>
