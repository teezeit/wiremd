<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <nav class="wmd-nav">
  <div class="wmd-nav-content">
    <div class="wmd-brand">App</div>
    <button class="wmd-button">Dashboard</button>
    <button class="wmd-button">Projects</button>
    <button class="wmd-button">Team</button>
    <button class="wmd-button">Settings</button>
    <button class="wmd-button">Logout</button>
  </div>
</nav>
<div class="wmd-row wmd-right">
  <div class="wmd-grid-item">
    <button class="wmd-button wmd-button-primary">+ New Project</button>
  </div>
</div>
<h2 class="wmd-h2">Projects</h2>
<table class="wmd-table">
  <thead>
    <tr>
      <th class="wmd-table-cell wmd-align-left">Name</th>
    <th class="wmd-table-cell wmd-align-left">Status</th>
    <th class="wmd-table-cell wmd-align-left">Updated</th>
    </tr>
  </thead>
  <tbody>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Alpha</td>
    <td class="wmd-table-cell wmd-align-left"><span class="wmd-badge wmd-badge-success">Active</span></td>
    <td class="wmd-table-cell wmd-align-left">Today</td>
  </tr>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Beta</td>
    <td class="wmd-table-cell wmd-align-left"><span class="wmd-badge wmd-badge-warning">Review</span></td>
    <td class="wmd-table-cell wmd-align-left">Yesterday</td>
  </tr>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Gamma</td>
    <td class="wmd-table-cell wmd-align-left"><span class="wmd-badge">Draft</span></td>
    <td class="wmd-table-cell wmd-align-left">3 days ago</td>
  </tr>
  </tbody>
</table>
  
  
</body>
</html>
