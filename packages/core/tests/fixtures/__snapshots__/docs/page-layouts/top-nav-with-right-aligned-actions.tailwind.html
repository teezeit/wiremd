<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <nav class="bg-white shadow-sm rounded-lg p-4 mb-8">
  <div class="flex items-center gap-6 flex-wrap">
    <div class="font-bold text-xl text-gray-900 mr-auto flex items-center gap-2">App</div>
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Dashboard</button>
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Projects</button>
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Team</button>
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Settings</button>
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Logout</button>
  </div>
</nav>
  <div class="flex items-center gap-3 flex-wrap justify-end">
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">+ New Project</button>
  </div>
</div>
  <h2 class="text-3xl font-bold text-gray-900 mb-3 mt-6">Projects</h2>
  <table class="min-w-full bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden my-6">
  <thead class="bg-gray-50">
    <tr>
      <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Name</th>
    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Status</th>
    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Updated</th>
    </tr>
  </thead>
  <tbody class="divide-y divide-gray-200">
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Alpha</td>
    <td class="px-6 py-3 text-gray-900"><span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Active</span></td>
    <td class="px-6 py-3 text-gray-900">Today</td>
  </tr>
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Beta</td>
    <td class="px-6 py-3 text-gray-900"><span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">Review</span></td>
    <td class="px-6 py-3 text-gray-900">Yesterday</td>
  </tr>
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Gamma</td>
    <td class="px-6 py-3 text-gray-900"></td>
    <td class="px-6 py-3 text-gray-900">Draft</td>
    <td class="px-6 py-3 text-gray-900">{}</td>
    <td class="px-6 py-3 text-gray-900">3 days ago</td>
  </tr>
  </tbody>
</table>
</body>
</html>
