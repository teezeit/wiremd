<!DOCTYPE html>
<html lang="en">
<head>

  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">

    </tr>

    <td class="px-6 py-3 text-gray-900">Alice M.</td>
    <td class="px-6 py-3 text-gray-900">Admin</td>
    <td class="px-6 py-3 text-gray-900">Active</td>
  </tr>
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Bob K.</td>
    <td class="px-6 py-3 text-gray-900">Editor</td>
    <td class="px-6 py-3 text-gray-900">Active</td>
  </tr>
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Clara T.</td>
    <td class="px-6 py-3 text-gray-900">Viewer</td>
    <td class="px-6 py-3 text-gray-900">Inactive</td>
  </tr>
  </tbody>
</table>
</body>
</html>
