<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <table class="wmd-table">
  <thead>
    <tr>
      <th class="wmd-table-cell wmd-align-left">Feature</th>
    <th class="wmd-table-cell wmd-align-left">Basic</th>
    <th class="wmd-table-cell wmd-align-left">Pro</th>
    <th class="wmd-table-cell wmd-align-left">Enterprise</th>
    </tr>
  </thead>
  <tbody>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Users</td>
    <td class="wmd-table-cell wmd-align-left">1</td>
    <td class="wmd-table-cell wmd-align-left">10</td>
    <td class="wmd-table-cell wmd-align-left">Unlimited</td>
  </tr>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Storage</td>
    <td class="wmd-table-cell wmd-align-left">1 GB</td>
    <td class="wmd-table-cell wmd-align-left">50 GB</td>
    <td class="wmd-table-cell wmd-align-left">Custom</td>
  </tr>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Support</td>
    <td class="wmd-table-cell wmd-align-left">|Community|</td>
    <td class="wmd-table-cell wmd-align-left">|Email|{.warning}</td>
    <td class="wmd-table-cell wmd-align-left">|SLA|{.success}</td>
  </tr>
    <tr>
    <td class="wmd-table-cell wmd-align-left">API Access</td>
    <td class="wmd-table-cell wmd-align-left">—</td>
    <td class="wmd-table-cell wmd-align-left">|Yes|{.success}</td>
    <td class="wmd-table-cell wmd-align-left">|Yes|{.success}</td>
  </tr>
  </tbody>
</table>
  
  
</body>
</html>
