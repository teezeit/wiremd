<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <table class="min-w-full bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden my-6">
  <thead class="bg-gray-50">
    <tr>
      <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Feature</th>
    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Basic</th>
    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Pro</th>
    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Enterprise</th>
    </tr>
  </thead>
  <tbody class="divide-y divide-gray-200">
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Users</td>
    <td class="px-6 py-3 text-gray-900">1</td>
    <td class="px-6 py-3 text-gray-900">10</td>
    <td class="px-6 py-3 text-gray-900">Unlimited</td>
  </tr>
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Storage</td>
    <td class="px-6 py-3 text-gray-900">1 GB</td>
    <td class="px-6 py-3 text-gray-900">50 GB</td>
    <td class="px-6 py-3 text-gray-900">Custom</td>
  </tr>
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">Support</td>
    <td class="px-6 py-3 text-gray-900"><span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">Community</span></td>
    <td class="px-6 py-3 text-gray-900"><span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">Email</span></td>
    <td class="px-6 py-3 text-gray-900"><span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">SLA</span></td>
  </tr>
    <tr class="hover:bg-gray-50">
    <td class="px-6 py-3 text-gray-900">API Access</td>
    <td class="px-6 py-3 text-gray-900">—</td>
    <td class="px-6 py-3 text-gray-900"><span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Yes</span></td>
    <td class="px-6 py-3 text-gray-900"><span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Yes</span></td>
  </tr>
  </tbody>
</table>
</body>
</html>
