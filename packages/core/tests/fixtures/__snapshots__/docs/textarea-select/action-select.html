<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-container-form-group">
  Project actions
<select class="wmd-select wmd-action-select">
    <option value="" disabled selected>Actions</option>
    <option value="Duplicate" data-action="Duplicate">Duplicate</option>
    <option value="Archive" data-action="Archive">Archive</option>
    <option value="Delete" data-action="Delete">Delete</option>
  </select>
</div>
  
  
</body>
</html>
