<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <h2 class="wmd-h2">Feedback</h2>
<div class="wmd-container-form-group">
  Category
<select class="wmd-select">
    <option value="" disabled selected>Select category</option>
    <option value="Bug report">Bug report</option>
    <option value="Feature request">Feature request</option>
    <option value="General feedback">General feedback</option>
  </select>
</div>
<div class="wmd-container-form-group">
  Description
<textarea class="wmd-textarea" rows="5" placeholder="Describe the issue..." required></textarea>
</div>
<div class="wmd-container-button-group">
  <button class="wmd-button wmd-button-primary">Submit Feedback</button>
<button class="wmd-button">Cancel</button>
</div>
  
  
</body>
</html>
