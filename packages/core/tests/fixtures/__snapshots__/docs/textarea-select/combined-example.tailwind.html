<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <h2 class="text-3xl font-bold text-gray-900 mb-3 mt-6">Feedback</h2>
  <div class="mb-4">
  Category
  <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
    <option value="" disabled selected>Select category</option>
    <option value="Bug report">Bug report</option>
    <option value="Feature request">Feature request</option>
    <option value="General feedback">General feedback</option>
  </select>
</div>
  <div class="mb-4">
  Description
  <textarea class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-vertical" rows="5" placeholder="Describe the issue..." required></textarea>
</div>
  <div class="flex items-center gap-3 flex-wrap">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">Submit Feedback</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Cancel</button>
</div>
</body>
</html>
