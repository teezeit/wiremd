<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-accordion" data-wmd-accordion>
<details class="wmd-accordion-item">
  <summary class="wmd-accordion-summary">What is wiremd?</summary>
  <div class="wmd-accordion-body">
  <p class="wmd-paragraph">wiremd converts Markdown into HTML wireframes.</p>
  </div>
</details>
<details class="wmd-accordion-item">
  <summary class="wmd-accordion-summary">Can I export to React?</summary>
  <div class="wmd-accordion-body">
  <p class="wmd-paragraph">Yes. Use <code class="wmd-code-inline">--format react</code>.</p>
  </div>
</details>
<details class="wmd-accordion-item">
  <summary class="wmd-accordion-summary">Is it free?</summary>
  <div class="wmd-accordion-body">
  <p class="wmd-paragraph">Yes, MIT licensed.</p>
  </div>
</details>
</div>
  
  
</body>
</html>
