<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-accordion" data-wmd-accordion>
<details class="wmd-accordion-item">
  <summary class="wmd-accordion-summary">Collapsed item</summary>
  <div class="wmd-accordion-body">
  <p class="wmd-paragraph">This one starts closed.</p>
  </div>
</details>
<details class="wmd-accordion-item" open>
  <summary class="wmd-accordion-summary">Expanded item</summary>
  <div class="wmd-accordion-body">
  <p class="wmd-paragraph">This one starts open.</p>
  </div>
</details>
<details class="wmd-accordion-item">
  <summary class="wmd-accordion-summary">Another collapsed item</summary>
  <div class="wmd-accordion-body">
  <p class="wmd-paragraph">Also closed by default.</p>
  </div>
</details>
</div>
  
  
</body>
</html>
