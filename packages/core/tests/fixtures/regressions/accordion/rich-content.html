<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-accordion" data-wmd-accordion>
<details class="wmd-accordion-item">
  <summary class="wmd-accordion-summary">Contact us</summary>
  <div class="wmd-accordion-body">
  <div class="wmd-container-form-group">
  Name
<input type="text" class="wmd-input" style="width: 29ch; max-width: 29ch;" />
</div>
<div class="wmd-container-form-group">
  Email
<input type="email" class="wmd-input" style="width: 29ch; max-width: 29ch;" />
</div>
<button class="wmd-button wmd-button-primary">Send message</button>
  </div>
</details>
<details class="wmd-accordion-item">
  <summary class="wmd-accordion-summary">FAQ</summary>
  <div class="wmd-accordion-body">
  <ul class="wmd-list">
  <li class="wmd-list-item">What formats are supported?</li>
  <li class="wmd-list-item">Can I use the CLI?</li>
  <li class="wmd-list-item">Is there a VS Code extension?</li>
</ul>
  </div>
</details>
</div>
  
  
</body>
</html>
