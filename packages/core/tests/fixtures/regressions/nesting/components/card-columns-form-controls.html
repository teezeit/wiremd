<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-container-card">
  <h3 class="wmd-h3">Launch checklist</h3>
<div class="wmd-grid wmd-grid-2" style="--grid-columns: 2">
  <div class="wmd-grid-item">
    <h3 class="wmd-h3">Content</h3>
<div class="wmd-container-form-group">
  Title
<input type="text" class="wmd-input" placeholder="Spring campaign" required style="width: 21ch; max-width: 21ch;" />
</div>
<div class="wmd-container-form-group">
  Audience
<select class="wmd-select" required>
    <option value="" disabled selected>Select audience</option>
    <option value="All users">All users</option>
    <option value="Trial users">Trial users</option>
    <option value="Enterprise customers">Enterprise customers</option>
  </select>
</div>
<p class="wmd-paragraph">Delivery channel</p>
<ul class="wmd-list">
  <label class="wmd-radio">
    <input type="radio" checked name="radio-group-1" />
    <span>Email</span>
  </label>
  <label class="wmd-radio">
    <input type="radio" name="radio-group-1" />
    <span>Push notification</span>
  </label>
  <label class="wmd-radio">
    <input type="radio" name="radio-group-1" />
    <span>In-app banner</span>
  </label>
</ul>
  </div>
<div class="wmd-grid-item">
    <h3 class="wmd-h3">Controls</h3>
<label class="wmd-switch">
    <span class="wmd-switch-label">Schedule send</span>
    <input type="checkbox" role="switch" />
    <span class="wmd-switch-track"><span class="wmd-switch-thumb"></span></span>
  </label>
<label class="wmd-switch">
    <span class="wmd-switch-label">Require approval</span>
    <input type="checkbox" role="switch" checked />
    <span class="wmd-switch-track"><span class="wmd-switch-thumb"></span></span>
  </label>
<label class="wmd-switch">
    <span class="wmd-switch-label">Lock after publish</span>
    <input type="checkbox" role="switch" disabled />
    <span class="wmd-switch-track"><span class="wmd-switch-thumb"></span></span>
  </label>
<div class="wmd-row wmd-right">
  <div class="wmd-grid-item">
    <button class="wmd-button">Preview</button>
  </div>
<div class="wmd-grid-item">
    <button class="wmd-button wmd-button-primary">Publish</button>
  </div>
</div>
  </div>
</div>
</div>
  
  
</body>
</html>
