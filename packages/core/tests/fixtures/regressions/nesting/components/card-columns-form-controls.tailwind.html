<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="bg-white rounded-lg p-6 shadow-md border border-gray-200 my-4">
  <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Launch checklist</h3>
  <div class="grid gap-6 my-8 grid-cols-1 md:grid-cols-2">
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Content</h3>
    <div class="mb-4">
  Title
  <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="Spring campaign" required />
</div>
    <div class="mb-4">
  Audience
  <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" required>
    <option value="" disabled selected>Select audience</option>
    <option value="All users">All users</option>
    <option value="Trial users">Trial users</option>
    <option value="Enterprise customers">Enterprise customers</option>
  </select>
</div>
    <p class="text-gray-700 my-3">Delivery channel</p>
    <ul class="my-4 pl-6 space-y-2 list-disc">
  <label class="flex items-center gap-2 cursor-pointer">
    <input type="radio" class="w-4 h-4 text-indigo-600 border-gray-300 focus:ring-indigo-500" checked name="radio-group-1" />
    <span class="text-gray-900">Email</span>
  </label>
  <label class="flex items-center gap-2 cursor-pointer">
    <input type="radio" class="w-4 h-4 text-indigo-600 border-gray-300 focus:ring-indigo-500" name="radio-group-1" />
    <span class="text-gray-900">Push notification</span>
  </label>
  <label class="flex items-center gap-2 cursor-pointer">
    <input type="radio" class="w-4 h-4 text-indigo-600 border-gray-300 focus:ring-indigo-500" name="radio-group-1" />
    <span class="text-gray-900">In-app banner</span>
  </label>
</ul>
  </div>
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Controls</h3>
    <label class="flex items-center justify-between gap-3 cursor-pointer">
    <span class="text-gray-900">Schedule send</span>
    <input type="checkbox" role="switch" class="sr-only" />
    <span class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full border border-gray-400 bg-gray-100 transition-colors"><span class="absolute left-0.5 h-4 w-4 rounded-full bg-white border border-gray-400 shadow-sm"></span></span>
  </label>
    <label class="flex items-center justify-between gap-3 cursor-pointer">
    <span class="text-gray-900">Require approval</span>
    <input type="checkbox" role="switch" class="sr-only" checked />
    <span class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full border border-indigo-600 bg-indigo-600 transition-colors"><span class="absolute right-0.5 h-4 w-4 rounded-full bg-white shadow"></span></span>
  </label>
    <label class="flex items-center justify-between gap-3 opacity-50 cursor-not-allowed">
    <span class="text-gray-900">Lock after publish</span>
    <input type="checkbox" role="switch" class="sr-only" disabled />
    <span class="relative inline-flex h-5 w-9 shrink-0 items-center rounded-full border border-gray-400 bg-gray-100 transition-colors"><span class="absolute left-0.5 h-4 w-4 rounded-full bg-white border border-gray-400 shadow-sm"></span></span>
  </label>
    <div class="flex items-center gap-3 flex-wrap justify-end">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Preview</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">Publish</button>
</div>
  </div>
</div>
</div>
</body>
</html>
