<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-container-card">
  <h3 class="wmd-h3">Account workspace</h3>
<p class="wmd-paragraph">Manage the active workspace and billing context.</p>
<div class="wmd-tabs" data-wmd-tabs>
  <div class="wmd-tab-headers" role="tablist"><button type="button" role="tab" class="wmd-tab-header wmd-active" data-wmd-tab="0">Overview</button><button type="button" role="tab" class="wmd-tab-header" data-wmd-tab="1">Billing</button></div>
  <div class="wmd-tab-panels">
  <div class="wmd-tab-panel" role="tabpanel" data-wmd-tab-panel="0">
    <div class="wmd-grid wmd-grid-2" style="--grid-columns: 2">
  <div class="wmd-grid-item">
    <h3 class="wmd-h3">Workspace</h3>
<div class="wmd-container-form-group">
  Name
<input type="text" class="wmd-input" placeholder="Acme Design System" required style="width: 24ch; max-width: 24ch;" />
</div>
<label class="wmd-switch">
    <span class="wmd-switch-label">Public profile</span>
    <input type="checkbox" role="switch" checked />
    <span class="wmd-switch-track"><span class="wmd-switch-thumb"></span></span>
  </label>
  </div>
<div class="wmd-grid-item wmd-align-right">
    <div class="wmd-row wmd-right">
  <div class="wmd-grid-item">
    <button class="wmd-button">Archive</button>
  </div>
<div class="wmd-grid-item">
    <button class="wmd-button wmd-button-primary">Save workspace</button>
  </div>
</div>
  </div>
</div>
  </div>
  <div class="wmd-tab-panel" role="tabpanel" data-wmd-tab-panel="1" hidden>
    <div class="wmd-grid wmd-grid-3" style="--grid-columns: 3">
  <div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Starter</h3>
<p class="wmd-paragraph">$9 / month</p>
<button class="wmd-button">Current</button>
  </div>
<div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Pro</h3>
<p class="wmd-paragraph">$29 / month</p>
<button class="wmd-button wmd-button-primary">Upgrade</button>
  </div>
<div class="wmd-grid-item wmd-card wmd-grid-item-card">
    <h3 class="wmd-h3">Enterprise</h3>
<p class="wmd-paragraph">Custom</p>
<button class="wmd-button">Contact sales</button>
  </div>
</div>
  </div>
  </div>
</div><script>(function(){if(window.__wmdTabsInit)return;window.__wmdTabsInit=true;document.addEventListener('click',function(e){var btn=e.target.closest('.wmd-tab-header');if(!btn)return;var root=btn.closest('[data-wmd-tabs]');if(!root)return;var idx=btn.getAttribute('data-wmd-tab');root.querySelectorAll('.wmd-tab-header').forEach(function(b){b.classList.toggle('wmd-active',b.getAttribute('data-wmd-tab')===idx);});root.querySelectorAll('[data-wmd-tab-panel]').forEach(function(p){if(p.getAttribute('data-wmd-tab-panel')===idx){p.removeAttribute('hidden');}else{p.setAttribute('hidden','');}});});})();</script>
</div>
  
  
</body>
</html>
