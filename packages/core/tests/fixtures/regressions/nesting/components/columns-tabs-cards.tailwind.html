<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup - Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="grid gap-6 my-8 grid-cols-1 md:grid-cols-2">
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <div class="bg-white rounded-lg p-6 shadow-md border border-gray-200 my-4">
  <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Project Alpha</h3>
  <p class="text-gray-700 my-3">Primary project controls.</p>
  <!-- Unknown node type: tabs -->
</div>
  </div>
  <div class="bg-white border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow">
    <div class="bg-white rounded-lg p-6 shadow-md border border-gray-200 my-4">
  <h3 class="text-2xl font-semibold text-gray-900 mb-2 mt-4">Filters</h3>
  <input type="search" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="Search projects" />
  <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
    <option value="" disabled selected>Status</option>
    <option value="All">All</option>
    <option value="Active">Active</option>
    <option value="Archived">Archived</option>
  </select>
  <div class="flex items-center gap-3 flex-wrap">
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-gray-100 text-gray-900 hover:bg-gray-200 border border-gray-300">Reset</button>
  <button class="px-4 py-2 rounded-md font-medium transition-colors bg-indigo-600 text-white hover:bg-indigo-700">Apply</button>
</div>
</div>
  </div>
</div>
</body>
</html>
