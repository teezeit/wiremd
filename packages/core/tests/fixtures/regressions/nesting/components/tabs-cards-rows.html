<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wiremd Mockup</title>
  
</head>
<body class="wmd-root wmd-clean">
  <div class="wmd-tabs" data-wmd-tabs>
  <div class="wmd-tab-headers" role="tablist"><button type="button" role="tab" class="wmd-tab-header wmd-active" data-wmd-tab="0">Profile</button><button type="button" role="tab" class="wmd-tab-header" data-wmd-tab="1">Permissions</button></div>
  <div class="wmd-tab-panels">
  <div class="wmd-tab-panel" role="tabpanel" data-wmd-tab-panel="0">
    <div class="wmd-container-card">
  <h3 class="wmd-h3">Personal details</h3>
<div class="wmd-row">
  <div class="wmd-grid-item">
    <svg class="wmd-icon" data-icon="user" aria-label="user" role="img" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" /><path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2" /></svg>
  </div>
<div class="wmd-grid-item">
    <p class="wmd-paragraph">Jane Doe <span class="wmd-badge wmd-badge-primary">Admin</span></p>
  </div>
<div class="wmd-grid-item">
    <button class="wmd-button">Edit</button>
  </div>
<div class="wmd-grid-item">
    <button class="wmd-button wmd-button-danger">Deactivate</button>
  </div>
</div>
<div class="wmd-container-form-group">
  Email
<input type="email" class="wmd-input" placeholder="jane@example.com" required style="width: 22ch; max-width: 22ch;" />
</div>
</div>
  </div>
  <div class="wmd-tab-panel" role="tabpanel" data-wmd-tab-panel="1" hidden>
    <div class="wmd-container-card">
  <h3 class="wmd-h3">Role settings</h3>
<label class="wmd-switch">
    <span class="wmd-switch-label">Can invite members</span>
    <input type="checkbox" role="switch" checked />
    <span class="wmd-switch-track"><span class="wmd-switch-thumb"></span></span>
  </label>
<label class="wmd-switch">
    <span class="wmd-switch-label">Can manage billing</span>
    <input type="checkbox" role="switch" />
    <span class="wmd-switch-track"><span class="wmd-switch-thumb"></span></span>
  </label>
<label class="wmd-switch">
    <span class="wmd-switch-label">Requires approval</span>
    <input type="checkbox" role="switch" disabled />
    <span class="wmd-switch-track"><span class="wmd-switch-thumb"></span></span>
  </label>
<table class="wmd-table">
  <thead>
    <tr>
      <th class="wmd-table-cell wmd-align-left">Area</th>
    <th class="wmd-table-cell wmd-align-left">Access</th>
    </tr>
  </thead>
  <tbody>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Projects</td>
    <td class="wmd-table-cell wmd-align-left"><span class="wmd-badge wmd-badge-success">Full</span></td>
  </tr>
    <tr>
    <td class="wmd-table-cell wmd-align-left">Billing</td>
    <td class="wmd-table-cell wmd-align-left"><span class="wmd-badge wmd-badge-warning">Limited</span></td>
  </tr>
  </tbody>
</table>
</div>
  </div>
  </div>
</div><script>(function(){if(window.__wmdTabsInit)return;window.__wmdTabsInit=true;document.addEventListener('click',function(e){var btn=e.target.closest('.wmd-tab-header');if(!btn)return;var root=btn.closest('[data-wmd-tabs]');if(!root)return;var idx=btn.getAttribute('data-wmd-tab');root.querySelectorAll('.wmd-tab-header').forEach(function(b){b.classList.toggle('wmd-active',b.getAttribute('data-wmd-tab')===idx);});root.querySelectorAll('[data-wmd-tab-panel]').forEach(function(p){if(p.getAttribute('data-wmd-tab-panel')===idx){p.removeAttribute('hidden');}else{p.setAttribute('hidden','');}});});})();</script>
  
  
</body>
</html>
